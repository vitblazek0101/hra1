<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poznávačka přírody a jídla</title>
    <style>
        :root {
            --primary: #4CAF50;
            --primary-dark: #388E3C;
            --secondary: #2196F3;
            --bg: #f5f7fb;
            --text: #333;
            --white: #fff;
            --correct: #4caf50;
            --wrong: #f44336;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--white);
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
            padding: 30px;
            text-align: center;
        }

        h1 { color: var(--primary-dark); margin-bottom: 20px; }
        h2 { color: #555; }

        /* Obrazovky */
        .screen { display: none; }
        .screen.active { display: block; }

        /* Kategorie */
        .categories-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 15px 20px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .btn:hover { background-color: var(--primary-dark); transform: translateY(-2px); }
        
        .back-btn {
            background-color: #9e9e9e;
            margin-bottom: 15px;
            padding: 8px 15px;
            font-size: 14px;
        }
        .back-btn:hover { background-color: #757575; }

        .category-btn {
            background-color: var(--white);
            color: #333;
            border: 2px solid #ddd;
        }
        .category-btn:hover {
            border-color: var(--primary);
            background-color: #f9f9f9;
            color: var(--primary-dark);
        }

        /* Hra */
        .quiz-img {
            width: 100%;
            max-height: 300px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transition: opacity 0.3s;
            background-color: #eee;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        .option-btn {
            background-color: #f0f2f5;
            color: #333;
            border: 1px solid #ccc;
        }
        .option-btn:hover { background-color: #e4e6e9; }
        
        .option-btn.correct { background-color: var(--correct) !important; color: white; border-color: var(--correct); }
        .option-btn.wrong { background-color: var(--wrong) !important; color: white; border-color: var(--wrong); }

        /* Progress Bar */
        .progress-container {
            background-color: #e0e0e0;
            border-radius: 10px;
            height: 10px;
            margin: 20px 0;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background-color: var(--primary);
            width: 0%;
            transition: width 0.3s;
        }

        .score-text { font-size: 18px; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="screen-menu" class="screen active">
        <h1>Poznávačka</h1>
        <p>Vyber si kategorii a otestuj své znalosti!</p>
        <div class="categories-grid">
            <button class="btn category-btn" onclick="startQuiz('ptaci')">🦉 Ptáci v ČR</button>
            <button class="btn category-btn" onclick="startQuiz('savci')">🦊 Savci v ČR</button>
            <button class="btn category-btn" onclick="startQuiz('zelenina')">🥦 Zelenina</button>
            <button class="btn category-btn" onclick="startQuiz('ovoce')">🍎 Ovoce</button>
            <button class="btn category-btn" onclick="startQuiz('hmyz')">🐞 Hmyz v ČR</button>
        </div>
    </div>

    <div id="screen-game" class="screen">
        <button class="btn back-btn" onclick="resetGame()">← Zpět do menu</button>
        <div class="score-text">Skóre: <span id="current-score">0</span></div>
        <div class="progress-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>
        <h2 id="question-title">Co je na obrázku?</h2>
        <img id="quiz-image" class="quiz-img" src="" alt="Obrázek k otázce">
        <div class="options-grid" id="options-container">
            </div>
    </div>

    <div id="screen-results" class="screen">
        <h1>Konec hry!</h1>
        <h2>Tvoje celkové skóre: <span id="final-score">0</span> / <span id="total-questions">0</span></h2>
        <p id="result-message"></p>
        <button class="btn" style="margin-top: 20px;" onclick="resetGame()">Hrát znovu</button>
    </div>
</div>

<script>
    // DATA OTÁZEK (Zatím ukázka, můžeš doplňovat do 20 v každé kategorii)
    const quizData = {
        ptaci: [
            { img: "https://loremflickr.com/400/300/great-tit,bird", options: ["Čáp bílý", "Sýkora koňadra", "Kos černý", "Vrabec domácí"], correct: 1 },
            { img: "https://loremflickr.com/400/300/stork", options: ["Orel mořský", "Čáp bílý", "Labuť velká", "Káně lesní"], correct: 1 },
            { img: "https://loremflickr.com/400/300/blackbird", options: ["Drozd zpěvný", "Datel černý", "Kos černý", "Kukačka obecná"], correct: 2 },
            { img: "https://loremflickr.com/400/300/sparrow", options: ["Pěnkava obecná", "Vrabec domácí", "Strnad obecný", "Dlask tlustozobý"], correct: 1 },
            { img: "https://loremflickr.com/400/300/kingfisher", options: ["Ledňáček říční", "Rybák obecný", "Břehule říční", "Potápka roháč"], correct: 0 },
            { img: "https://loremflickr.com/400/300/swan", options: ["Husa velká", "Kachna divoká", "Labuť velká", "Lyska černá"], correct: 2 },
            { img: "https://loremflickr.com/400/300/kestrel", options: ["Jestřáb lesní", "Poštolka obecná", "Sokol stěhovavý", "Moták pochop"], correct: 1 },
            { img: "https://loremflickr.com/400/300/swallow,bird", options: ["Jiřička obecná", "Vlaštovka obecná", "Rorýs obecný", "Lejsek šedý"], correct: 1 },
            { img: "https://loremflickr.com/400/300/woodpecker", options: ["Strakapoud velký", "Žluna zelená", "Brhlík lesní", "Šoupálek krátkoprstý"], correct: 0 },
            { img: "https://loremflickr.com/400/300/eagle-owl", options: ["Puštík obecný", "Kalous ušatý", "Sýček obecný", "Výr velký"], correct: 3 }
        ],
        savci: [
            { img: "https://loremflickr.com/400/300/fox", options: ["Srnec obecný", "Liška obecná", "Jezevec lesní", "Prase divoké"], correct: 1 },
            { img: "https://loremflickr.com/400/300/lynx", options: ["Rys ostrovid", "Vlk obecný", "Medvěd hnědý", "Kočka divoká"], correct: 0 },
            { img: "https://loremflickr.com/400/300/deer", options: ["Jelen evropský", "Daněk skvrnitý", "Muflon", "Los evropský"], correct: 0 },
            { img: "https://loremflickr.com/400/300/badger", options: ["Kuna skalní", "Tchoř tmavý", "Jezevec lesní", "Vydra říční"], correct: 2 },
            { img: "https://loremflickr.com/400/300/wild-boar", options: ["Prase divoké", "Medvěd hnědý", "Býk", "Zubr"], correct: 0 },
            { img: "https://loremflickr.com/400/300/squirrel", options: ["Plch velký", "Veverka obecná", "Křeček polní", "Myšice lesní"], correct: 1 },
            { img: "https://loremflickr.com/400/300/hare", options: ["Králík divoký", "Zajíc polní", "Morče", "Nutrie"], correct: 1 },
            { img: "https://loremflickr.com/400/300/wolf", options: ["Pes domácí", "Vlk obecný", "Šakal obecný", "Hyena"], correct: 1 },
            { img: "https://loremflickr.com/400/300/hedgehog", options: ["Ježek západní", "Krtek obecný", "Rejsek malý", "Bodlín"], correct: 0 },
            { img: "https://loremflickr.com/400/300/beaver", options: ["Ondatra pižmová", "Bobr evropský", "Nutrie říční", "Vydra říční"], correct: 1 }
        ],
        zelenina: [
            { img: "https://loremflickr.com/400/300/broccoli", options: ["Mrkev", "Brokolice", "Květák", "Okurka"], correct: 1 },
            { img: "https://loremflickr.com/400/300/eggplant", options: ["Celer", "Rajče", "Paprika", "Lilek"], correct: 3 },
            { img: "https://loremflickr.com/400/300/carrot", options: ["Mrkev", "Petržel", "Pastinák", "Celer"], correct: 0 },
            { img: "https://loremflickr.com/400/300/bell-pepper", options: ["Chilli", "Kapie", "Paprika", "Fazolky"], correct: 2 },
            { img: "https://loremflickr.com/400/300/tomato", options: ["Třešeň", "Rajče", "Šípky", "Jeřabiny"], correct: 1 },
            { img: "https://loremflickr.com/400/300/cucumber", options: ["Cuketa", "Lilek", "Okurka", "Dýně"], correct: 2 },
            { img: "https://loremflickr.com/400/300/cauliflower", options: ["Květák", "Brokolice", "Zelí", "Kedluben"], correct: 0 },
            { img: "https://loremflickr.com/400/300/onion", options: ["Pórek", "Cibule", "Česnek", "Šalotka"], correct: 1 },
            { img: "https://loremflickr.com/400/300/garlic", options: ["Zázvor", "Křen", "Česnek", "Cibule"], correct: 2 },
            { img: "https://loremflickr.com/400/300/potatoes", options: ["Batáty", "Brambory", "Topinambury", "Řepa"], correct: 1 }
        ],
        ovoce: [
            { img: "https://loremflickr.com/400/300/apple", options: ["Jablko", "Hruška", "Pomeranč", "Banan"], correct: 0 },
            { img: "https://loremflickr.com/400/300/blueberry", options: ["Jahoda", "Malina", "Borůvka", "Ostružina"], correct: 2 },
            { img: "https://loremflickr.com/400/300/pear", options: ["Kdoule", "Hruška", "Fík", "Avokádo"], correct: 1 },
            { img: "https://loremflickr.com/400/300/strawberry", options: ["Jahoda", "Malina", "Brusinka", "Třešeň"], correct: 0 },
            { img: "https://loremflickr.com/400/300/raspberry", options: ["Ostružina", "Malina", "Moruše", "Borůvka"], correct: 1 },
            { img: "https://loremflickr.com/400/300/cherry", options: ["Višeň", "Třešeň", "Švestka", "Trnka"], correct: 1 },
            { img: "https://loremflickr.com/400/300/plum", options: ["Švestka", "Blůma", "Ringle", "Fík"], correct: 0 },
            { img: "https://loremflickr.com/400/300/apricot", options: ["Meruňka", "Broskev", "Nektarinka", "Mango"], correct: 0 },
            { img: "https://loremflickr.com/400/300/peach", options: ["Broskev", "Meruňka", "Pomeranč", "Papája"], correct: 0 },
            { img: "https://loremflickr.com/400/300/red-currant", options: ["Rybíz", "Borůvka", "Angrešt", "Bezinky"], correct: 0 }
        ],
        hmyz: [
            { img: "https://loremflickr.com/400/300/honey-bee", options: ["Mravenec", "Včela medonosná", "Vosa obecná", "Čmelák"], correct: 1 },
            { img: "https://loremflickr.com/400/300/ladybug", options: ["Slunéčko sedmitečné", "Mandelinka bramborová", "Roháč obecný", "Zlatohlávek"], correct: 0 },
            { img: "https://loremflickr.com/400/300/ant", options: ["Termit", "Včela", "Mravenec lesní", "Pavouk"], correct: 2 },
            { img: "https://loremflickr.com/400/300/butterfly", options: ["Bělásek", "Babočka paví oko", "Modrásek", "Žluťásek"], correct: 1 },
            { img: "https://loremflickr.com/400/300/wasp", options: ["Včela", "Sršeň", "Vosa obecná", "Čmelák"], correct: 2 },
            { img: "https://loremflickr.com/400/300/stag-beetle", options: ["Chrobák", "Roháč obecný", "Střevlík", "Vruboun"], correct: 1 },
            { img: "https://loremflickr.com/400/300/grasshopper", options: ["Kobylka zelená", "Cvrček", "Saranče", "Modlivka"], correct: 0 },
            { img: "https://loremflickr.com/400/300/cricket-insect", options: ["Šváb", "Cvrček polní", "Mravenec", "Cvrčivec"], correct: 1 },
            { img: "https://loremflickr.com/400/300/mosquito", options: ["Moucha", "Ovád", "Komár písklavý", "Tiplice"], correct: 2 },
            { img: "https://loremflickr.com/400/300/bumblebee", options: ["Včela", "Čmelák zemní", "Vosa", "Sršeň"], correct: 1 }
        ]
    };

    let currentCategory = '';
    let currentQuestions = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let answered = false;
    let gameTimeout;

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function startQuiz(category) {
        currentCategory = category;
        currentQuestions = [...quizData[category]];
        shuffleArray(currentQuestions);
        currentQuestionIndex = 0;
        score = 0;
        
        document.getElementById('screen-menu').classList.remove('active');
        document.getElementById('screen-game').classList.add('active');
        
        loadQuestion();
    }

    function loadQuestion() {
        answered = false;
        const currentQuestion = currentQuestions[currentQuestionIndex];
        const imgElement = document.getElementById('quiz-image');
        
        // Aktualizace UI
        document.getElementById('current-score').textContent = score;
        
        // Skrytí obrázku před načtením a nastavení zdroje
        imgElement.style.opacity = '0';
        imgElement.src = currentQuestion.img;

        // Jakmile se obrázek načte, plynule ho zobrazíme
        imgElement.onload = () => {
            imgElement.style.opacity = '1';
        };

        // Pokud se obrázek nepodaří načíst, použijeme náhradní
        imgElement.onerror = () => {
            imgElement.src = "https://placehold.co/400x300?text=Obrázek+není+dostupný";
            imgElement.style.opacity = '1';
        };
        
        const progressPercent = (currentQuestionIndex / currentQuestions.length) * 100;
        document.getElementById('progress-bar').style.width = progressPercent + '%';

        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';

        // Vygenerování tlačítek odpovědí
        currentQuestion.options.forEach((option, index) => {
            const btn = document.createElement('button');
            btn.classList.add('btn', 'option-btn');
            btn.textContent = option;
            btn.onclick = () => checkAnswer(index, btn);
            optionsContainer.appendChild(btn);
        });
    }

    function checkAnswer(selectedIndex, buttonElement) {
        if (answered) return; // Zamezí klikání na více tlačítek
        answered = true;

        const correctIndex = currentQuestions[currentQuestionIndex].correct;
        const buttons = document.querySelectorAll('.option-btn');

        if (selectedIndex === correctIndex) {
            score++;
            buttonElement.classList.add('correct');
        } else {
            score--;
            buttonElement.classList.add('wrong');
            buttons[correctIndex].classList.add('correct'); // Ukáže správnou odpověď
        }

        document.getElementById('current-score').textContent = score;

        // Počkáme 1.5 sekundy a přepneme na další otázku
        gameTimeout = setTimeout(() => {
            currentQuestionIndex++;
            if (currentQuestionIndex < currentQuestions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }, 1500);
    }

    function showResults() {
        document.getElementById('screen-game').classList.remove('active');
        document.getElementById('screen-results').classList.add('active');
        
        const total = currentQuestions.length;
        document.getElementById('final-score').textContent = score;
        document.getElementById('total-questions').textContent = total;
        
        const messageEl = document.getElementById('result-message');
        const percentage = (score / total) * 100;
        
        if (percentage === 100) messageEl.textContent = "Perfektní! Jsi naprostý mistr! 🏆";
        else if (percentage >= 70) messageEl.textContent = "Skvělá práce! Máš výborný přehled. 👍";
        else if (percentage >= 40) messageEl.textContent = "Dobrá snaha, ale ještě je co zlepšovat. 😉";
        else messageEl.textContent = "To se moc nepovedlo. Zkus to znovu! 📚";
    }

    function resetGame() {
        clearTimeout(gameTimeout);
        document.getElementById('screen-game').classList.remove('active');
        document.getElementById('screen-results').classList.remove('active');
        document.getElementById('screen-menu').classList.add('active');
    }
</script>

</body>
</html>
